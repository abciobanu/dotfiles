set-option -g history-limit 100000

# Verify: https://jdhao.github.io/2018/10/19/tmux_nvim_true_color/#verifying
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

set-window-option -g xterm-keys on

unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe 'xclip -in -selection clipboard &> /dev/null'
bind -T copy-mode-vi Enter send-keys -X cancel

bind r source-file ~/.tmux.conf

set -g base-index 1

set -s escape-time 0

set -g renumber-windows on

set -g set-clipboard on

set -g allow-passthrough on

set -g set-titles on
set -g set-titles-string "#T"

set -g mode-keys vi

set -g mouse on

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

set -g status-right ''
set -g status-right-length 0

set-option -g allow-rename off

set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

set-option -g focus-events on

# https://github.com/tinted-theming/tinted-tmux/blob/main/colors/base16-catppuccin-mocha.conf
source-file ~/.config/tmux/base16-catppuccin-mocha.conf
