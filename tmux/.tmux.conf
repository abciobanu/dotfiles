# Set scroll history to 100k lines
set-option -g history-limit 100000

# Use 256 colors
# Verify: https://jdhao.github.io/2018/10/19/tmux_nvim_true_color/#verifying
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Enable xterm-keys to pass through Ctrl+arrow keys and other shortcuts
set-window-option -g xterm-keys on

# Unbind the prefix and bind it to Ctrl-a like screen
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Copy to X clipboard
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe 'xclip -in -selection clipboard &> /dev/null'
bind -T copy-mode-vi Enter send-keys -X cancel

# Shortcut for reloading tmux config
bind r source-file ~/.tmux.conf

# Start windows at index 1, not 0
set -g base-index 1

# Avoid ESC delay
set -s escape-time 0

# Automatically renumber the windows of a session after any window is closed
set -g renumber-windows on

# Enable full clipboard integration
set -g set-clipboard on

# Enable escape sequence passthrough
set -g allow-passthrough on

# Fix titlebar
set -g set-titles on
set -g set-titles-string "#T"

# Vim mode
set -g mode-keys vi

# Mouse friendly
set -g mouse on

# Move between panes with vi keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Avoid date/time taking up space
set -g status-right ''
set -g status-right-length 0

# Do not rename windows automatically
set-option -g allow-rename off

# Turn off visuals when the bell rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# Enable focus-events
set-option -g focus-events on

# https://github.com/tinted-theming/tinted-tmux/blob/main/colors/base16-catppuccin-mocha.conf
source-file ~/.config/tmux/base16-catppuccin-mocha.conf
